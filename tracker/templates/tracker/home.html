<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HealthMate AI - Tracker</title>
    <style>
        body { font-family: Arial; margin: 2rem; }
        .entry { margin-top: 1rem; padding: 1rem; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>HealthMate AI - Daily Tracker</h1>
   <a href="{% url 'add_metric' %}">Add Metric</a> |
   <a href="{% url 'view_metrics' %}">View Metrics</a>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Entry</button>
    </form>

    <h2>Previous Entries</h2>
    {% for entry in entries %}
        <div class="entry">
            <strong>{{ entry.date }}</strong><br>
            Weight: {{ entry.weight }} kg<br>
            Steps: {{ entry.steps }}<br>
            Notes: {{ entry.notes }}
        </div>
    {% empty %}
        <p>No entries yet.</p>
    {% endfor %}
</body>
</html>
